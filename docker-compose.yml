version: '3.8'

services:
  # The FastAPI Backend
  api:
    build: .
    container_name: jira-ml-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
    volumes:
      - ./artifacts:/app/artifacts
      - ./data:/app/data
    deploy:
      resources:
        limits:
          memory: 2G
    restart: unless-stopped

  # The Streamlit Frontend
  dashboard:
    build: .
    container_name: jira-streamlit
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000  # Streamlit talks to the API service name
    # We override the CMD from the Dockerfile to run Streamlit instead of Uvicorn
    command: ["streamlit", "run", "src/ui/app.py", "--server.port=8501", "--server.address=0.0.0.0"]
    depends_on:
      - api
    restart: unless-stopped